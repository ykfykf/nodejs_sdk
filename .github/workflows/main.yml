# .github/workflows/release.yml
name: Release Node.js SDK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore: ['**.md', '.gitignore', 'LICENSE']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Checkout 代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 安装 pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.10.0
          run_install: false

      # 3. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      # 4. 获取版本号并设置 tag
      - name: Extract Version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      # 5. 获取 release_info
      - name: Extract Release Info
        id: release_info
        run: |
          if [ -f ".release_info" ]; then
            RELEASE_UUID=$(cat .release_info | jq -r '.release_uuid')
            echo "release_uuid=$RELEASE_UUID" >> $GITHUB_OUTPUT
          fi

      # 6. 安装依赖（保证 lockfile 存在）
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # 7. 编译项目
      - name: Build
        run: pnpm -w run build --if-present

      # 8. 运行测试
      - name: Test
        run: pnpm -w run test --if-present

      # 9. 创建 Git tag
      - name: Create Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.version.outputs.tag }} -m "Release ${{ steps.version.outputs.tag }}"
          git push origin ${{ steps.version.outputs.tag }}

      # 10. 读取 Changelog
      - name: Read Changelog
        id: changelog
        run: |
          CHANGELOG_FILE=".changelog/${{ steps.version.outputs.tag }}.md"
          if [ -f "$CHANGELOG_FILE" ]; then
            delimiter="$(openssl rand -hex 8)"
            echo "content<<$delimiter" >> $GITHUB_OUTPUT
            cat "$CHANGELOG_FILE" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "$delimiter" >> $GITHUB_OUTPUT
          else
            echo "content=Release ${{ steps.version.outputs.tag }}" >> $GITHUB_OUTPUT
          fi

      # 11. 创建 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.content }}

      # 12. 发布到 npm
      - name: Publish to npm
        run: pnpm -w publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 13. 通知 CASM
      - name: Notify CASM
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.CASM_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          CONCLUSION="${{ job.status == 'success' && 'success' || 'failure' }}"
          PAYLOAD=$(cat <<EOF
          {
            "action": "nodejs",
            "workflow_run": {
              "id": ${{ github.run_id }},
              "name": "${{ github.workflow }}",
              "conclusion": "$CONCLUSION",
              "head_branch": "${{ github.ref_name }}",
              "head_sha": "${{ github.sha }}",
              "html_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "release_uuid": "${{ steps.release_info.outputs.release_uuid }}"
            },
            "repository": {
              "full_name": "${{ github.repository }}"
            }
          }
          EOF
          )
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | cut -d' ' -f2)
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -H "X-TT-ENV: boe_githubaction" \
            -d "$PAYLOAD"